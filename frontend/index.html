<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Fuentes tipográficas Inter (Executive Dark) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proyectos CJDG - Ecosistema Operativo</title>
  </head>
  <body class="bg-[#0f1219] text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- WebChat visitor scoping: garantiza un visitorId distinto por usuario CJDG
         para que el historial del widget NO se comparta entre cuentas en el mismo navegador.
         DEBE correr ANTES del script del widget (que es defer): los inline scripts sin defer
         se ejecutan en orden de aparición, por lo que setea localStorage antes de que el widget lo lea. -->
    <script>
      (function () {
        var CHANNEL_ID = 'cmokblc570vl9mm1r6bxrpayg';
        var WIDGET_KEY = 'webchat_visitor_' + CHANNEL_ID;
        var REGISTRY_KEY = 'cjdg_webchat_visitors';
        function newVisitorId() {
          return 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
        }
        try {
          var raw = localStorage.getItem('cjdg_user');
          var userId = null;
          if (raw) {
            var u = JSON.parse(raw);
            if (u && u.id) userId = String(u.id);
          }
          if (userId) {
            // Logueado: visitor persistente por usuario en el registry.
            var registry = {};
            var rawReg = localStorage.getItem(REGISTRY_KEY);
            if (rawReg) {
              try { registry = JSON.parse(rawReg) || {}; } catch (e) { registry = {}; }
            }
            // Limpiar cualquier rastro de sesión anónima previa (no se persiste entre anónimos).
            if (registry.anon) {
              delete registry.anon;
            }
            var visitorId = registry[userId];
            if (!visitorId) {
              visitorId = newVisitorId();
              registry[userId] = visitorId;
            }
            localStorage.setItem(REGISTRY_KEY, JSON.stringify(registry));
            localStorage.setItem(WIDGET_KEY, visitorId);
          } else {
            // Anónimo: visitor efímero en cada page load — el chat NO persiste sin credenciales.
            localStorage.setItem(WIDGET_KEY, newVisitorId());
          }
        } catch (e) {
          // Si localStorage falla (modo privado), el widget creará su propio visitor — fallback aceptable.
        }
      })();
    </script>
    <!-- ArtificialIC WebChat Widget -->
    <script
      src="https://artificialic.com/webchat-widget.js"
      data-channel-id="cmokblc570vl9mm1r6bxrpayg"
      data-api-key="wc_5a6bdbb8fb14cb75a044278c351e0e36e45c68c302e59b25"
      defer
    ></script>
    <!-- Workaround: recarga el iframe del widget cada vez que se abre,
         para forzar estado fresco (mensajes nuevos sin refrescar página). -->
    <script>
      (function () {
        var SELECTOR = 'iframe[src*="artificialic.com"]';
        var lastVisible = false;
        function findIframe() {
          return document.querySelector(SELECTOR);
        }
        function isVisible(el) {
          if (!el) return false;
          var rect = el.getBoundingClientRect();
          if (rect.width < 50 || rect.height < 50) return false;
          var style = getComputedStyle(el);
          if (style.display === 'none' || style.visibility === 'hidden') return false;
          if (parseFloat(style.opacity) < 0.1) return false;
          return true;
        }
        function tick() {
          var iframe = findIframe();
          if (!iframe) return;
          var visible = isVisible(iframe);
          if (visible && !lastVisible) {
            var src = iframe.src;
            if (src && src !== 'about:blank') {
              iframe.src = 'about:blank';
              setTimeout(function () { iframe.src = src; }, 60);
            }
          }
          lastVisible = visible;
        }
        setInterval(tick, 500);
      })();
    </script>
  </body>
</html>
