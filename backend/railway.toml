# ============================================================
# Proyectos CJDG — Configuracion Railway
# SC-DEPLOY-002 — Railway lee este archivo si root dir = backend/
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.prod"

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
